# config.yaml -- dropwsl configuration
# Teams can customize without changing code.
# Docs: README.md#Customization

# ---------------------------------------------------------------------------
# Supported distros and minimum versions
# ---------------------------------------------------------------------------
distro:
  default: "Ubuntu-24.04"
  supported:
    - ubuntu
    - debian
  min_versions:
    ubuntu: "22.04"
    debian: "12"

# ---------------------------------------------------------------------------
# dropwsl repository (self-install / self-update)
# ---------------------------------------------------------------------------
repo:
  url: "https://github.com/yurifranconeri/dropwsl.git"
  install_dir: "~/.local/share/dropwsl"

# ---------------------------------------------------------------------------
# Default directory for new projects (--new)
# ---------------------------------------------------------------------------
projects:
  dir: "~/projects"

# ---------------------------------------------------------------------------
# Core -- enable/disable tools and pin versions
# dropwsl only installs tools with enabled: true
# systemd, git and vscode are always-on (no toggle) -- called explicitly by dropwsl.sh
# ---------------------------------------------------------------------------
core:
  wsl-vpnkit:
    enabled: true              # Tunnels WSL traffic through Windows network stack (VPN/private endpoints)
    version: "v0.4.1"
  docker:
    enabled: true
    mtu: 1400
    log_max_size: "10m"
    log_max_file: 3
  kubectl:
    enabled: true
    version: "1.34"
  kind:
    enabled: true
    version: "v0.27.0"
  helm:
    enabled: true
    version: "v3.17.3"
  azure-cli:
    enabled: true
  github-cli:
    enabled: true

# ---------------------------------------------------------------------------
# Layer versions (--with)
# Root-level keys because the YAML parser (pure bash) does not support nesting.
# ---------------------------------------------------------------------------
gitleaks_version: "v8.21.2"
mcp_fetch_version: "2025.1.14"
mcp_git_version: "2025.1.14"
mcp_github_version: "2025.6.18"

# ---------------------------------------------------------------------------
# Git -- global defaults configured by dropwsl
# ---------------------------------------------------------------------------
git:
  defaults:
    init.defaultBranch: "main"
    core.autocrlf: "input"
    push.autoSetupRemote: "true"
    pull.ff: "only"
    fetch.prune: "true"
    diff.colorMoved: "zebra"
    merge.conflictstyle: "zdiff3"   # shows base ancestor in conflicts (Git 2.35+)
    rerere.enabled: "true"          # reuse recorded conflict resolutions
    rebase.autoStash: "true"        # auto stash/unstash on rebase (complements pull.ff=only)

# ---------------------------------------------------------------------------
# VS Code -- extensions installed on the Windows side
# ---------------------------------------------------------------------------
vscode:
  extensions:
    - ms-vscode-remote.remote-wsl
    - ms-vscode-remote.remote-containers
    - ms-azuretools.vscode-docker

# ---------------------------------------------------------------------------
# Defaults -- layers applied automatically on every --new
# Use --no-defaults to skip. Only cross-language layers.
# ---------------------------------------------------------------------------
defaults:
  layers:
    - uv
    - gitleaks
    - trivy

# ---------------------------------------------------------------------------
# Linux user -- user/password creation behavior in WSL
# ---------------------------------------------------------------------------
user:
  # Create user without password (true) or prompt interactively (false)
  # For CI/CD, set env DROPWSL_PASSWORD to pass a password without prompt
  create_passwordless: true

  # Configure sudo without password (true) or require password (false)
  # For compliance environments (SOX, PCI-DSS, HIPAA), set false
  sudo_nopasswd: true

# ---------------------------------------------------------------------------
# Windows -- settings applied by install.ps1 (requires Admin)
# ---------------------------------------------------------------------------
windows:
  defender_exclusions: true    # Exclude WSL processes from Defender real-time scanning (improves I/O)

# ---------------------------------------------------------------------------
# Enterprise -- .wslconfig settings (used by install.ps1)
# Docs: https://learn.microsoft.com/en-us/windows/wsl/wsl-config
# dnsTunneling: false because true conflicts with GlobalProtect VPN.
#
# Resource keys (processors, memory, swap):
#   "auto" = computed from machine specs (recommended)
#   Explicit value = override (e.g. "8GB", "4")
# Formulas:
#   processors auto = total_cores - 1 (min 2)
#   memory     auto = 50% RAM, rounded to GB (min 4GB, max 16GB)
#   swap       fixed at 2GB (large swap masks memory issues and degrades I/O)
# ---------------------------------------------------------------------------
wslconfig:
  # Networking (enterprise)
  networkingMode: "mirrored"
  dnsTunneling: "false"
  autoProxy: "true"
  # Resources (auto = computed from machine specs)
  processors: "auto"
  memory: "auto"
  swap: "2GB"
