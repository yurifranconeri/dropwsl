# Config fixture — 2-space indent (instead of 4-space)
distro:
  supported:
    - ubuntu
    - debian
  min_versions:
    ubuntu: "24.04"
    debian: "12"

core:
  docker:
    enabled: true
  kubectl:
    enabled: true
    version: "1.34"

vscode:
  extensions:
    - ms-vscode-remote.remote-wsl

git:
  defaults:
    init.defaultBranch: "main"
    core.autocrlf: "input"
