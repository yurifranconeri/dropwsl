# Config fixture — all tools enabled
distro:  default: "Ubuntu-24.04"  supported:
    - ubuntu
    - debian
  min_versions:
    ubuntu: "22.04"
    debian: "12"

repo:
  url: "https://github.com/yurifranconeri/dropwsl.git"
  install_dir: "~/.local/share/dropwsl"

projects:
  dir: "~/projects"

core:
  docker:
    enabled: true
    mtu: 1400
    log_max_size: "10m"
    log_max_file: 3
  kubectl:
    enabled: true
    version: "1.34"
  kind:
    enabled: true
    version: "v0.27.0"
  helm:
    enabled: true
    version: "v3.17.3"
  azure-cli:
    enabled: true
  github-cli:
    enabled: true

vscode:
  extensions:
    - ms-vscode-remote.remote-wsl
    - ms-vscode-remote.remote-containers
    - ms-azuretools.vscode-docker

git:
  defaults:
    init.defaultBranch: "main"
    core.autocrlf: "input"
    push.autoSetupRemote: "true"
    pull.ff: "only"
    fetch.prune: "true"
    diff.colorMoved: "zebra"
    merge.conflictstyle: "zdiff3"   # inline comment with spaces
    rerere.enabled: "true"          # another inline comment
    rebase.autoStash: "true"

defaults:
  layers:
    - src
    - mypy

gitleaks_version: "v8.21.2"
mcp_fetch_version: "2025.1.14"
mcp_git_version: "2025.1.14"
mcp_github_version: "2025.6.18"

wslconfig:
  networkingMode: "mirrored"
  dnsTunneling: "false"
  autoProxy: "true"
  processors: "auto"
  memory: "auto"
  swap: "2GB"
