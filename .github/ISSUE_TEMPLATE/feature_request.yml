name: Feature Request
description: Suggest a new feature, layer, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
      placeholder: |
        A new layer `--with my-feature` that:
        - Adds X to the project
        - Configures Y in devcontainer.json

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New layer (--with)
        - New core tool
        - New language/template
        - CLI improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered